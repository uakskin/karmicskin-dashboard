<style>
  /* THEME VARIABLES */
  :root {
    --bg-page: #f8f9fa; --bg-card: #ffffff; --bg-card-alt: #f3f4f6; --bg-input: #ffffff;
    --border: #e5e7eb; --border-hover: #d1d5db;
    --text-primary: #111827; --text-secondary: #6b7280; --text-muted: #9ca3af; --text-heading: #374151;
    --table-header-bg: #f9fafb; --table-border: #f3f4f6; --table-hover: #f9fafb;
    --dropdown-shadow: 0 12px 40px rgba(0,0,0,0.1);
    --accent: #0d9488; --accent-hover: #0f766e;
    --positive: #16a34a; --negative: #dc2626;
    --highlight-bg: rgba(168, 85, 247, 0.08); --highlight-text: #7c3aed;
    --sort-active: #7c3aed;
    --chart-grid: #f3f4f6; --chart-tick: #9ca3af;
    --tooltip-bg: #1f2937; --tooltip-title: #f3f4f6; --tooltip-body: #d1d5db; --tooltip-border: #374151;
    --toggle-border: #d1d5db;
    --amber: #f59e0b; --amber-bg: rgba(245,158,11,0.1);
    --green-bg: rgba(22,163,74,0.1); --red-bg: rgba(220,38,38,0.1);
  }
  [data-theme="dark"] {
    --bg-page: #0f1117; --bg-card: #18181b; --bg-card-alt: #1e1e22; --bg-input: #0f1117;
    --border: #27272a; --border-hover: #3f3f46;
    --text-primary: #f4f4f5; --text-secondary: #a1a1aa; --text-muted: #71717a; --text-heading: #e4e4e7;
    --table-header-bg: #1e1e22; --table-border: #1f1f23; --table-hover: #1e1e22;
    --dropdown-shadow: 0 12px 40px rgba(0,0,0,0.5);
    --accent: #34d399; --accent-hover: #6ee7b7;
    --positive: #22c55e; --negative: #ef4444;
    --highlight-bg: rgba(228, 193, 249, 0.15); --highlight-text: #E4C1F9;
    --sort-active: #E4C1F9;
    --chart-grid: #27272a; --chart-tick: #52525b;
    --tooltip-bg: #27272a; --tooltip-title: #e4e4e7; --tooltip-body: #a1a1aa; --tooltip-border: #3f3f46;
    --toggle-border: #3f3f46;
    --amber: #fbbf24; --amber-bg: rgba(251,191,36,0.12);
    --green-bg: rgba(34,197,94,0.12); --red-bg: rgba(239,68,68,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-page); color: var(--text-primary); min-height: 100vh; transition: background 0.2s, color 0.2s; }

  /* PAGE NAV */
  .page-nav { display: flex; border-bottom: 1px solid var(--border); background: var(--bg-card); position: sticky; top: 0; z-index: 102; }
  .page-nav a { padding: 10px 20px; font-size: 13px; font-weight: 600; color: var(--text-muted); text-decoration: none; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .page-nav a:hover { color: var(--text-primary); }
  .page-nav a.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* HEADER */
  .header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; position: sticky; top: 38px; z-index: 101; background: var(--bg-page); }
  .header-left h1 { font-size: 18px; font-weight: 600; color: var(--text-primary); display: inline; }
  .header-left .brand { font-size: 11px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }

  /* THEME TOGGLE */
  .theme-toggle { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 5px 10px; cursor: pointer; font-size: 16px; line-height: 1; transition: all 0.15s; }
  .theme-toggle:hover { border-color: var(--border-hover); }

  /* DATE PICKER */
  .date-picker-wrap { position: relative; }
  .date-picker-btn { padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border-hover); background: var(--bg-card); color: var(--text-primary); font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .date-picker-btn:hover { border-color: var(--text-muted); }
  .date-picker-btn svg { width: 14px; height: 14px; fill: var(--text-muted); }

  .date-dropdown { position: absolute; top: calc(100% + 6px); right: 0; background: var(--bg-card); border: 1px solid var(--border-hover); border-radius: 12px; box-shadow: var(--dropdown-shadow); z-index: 100; display: none; min-width: 320px; }
  .date-dropdown.open { display: flex; }
  .date-presets { border-right: 1px solid var(--border); padding: 8px 0; min-width: 150px; }
  .date-preset { padding: 8px 16px; font-size: 13px; color: var(--text-secondary); cursor: pointer; display: block; width: 100%; text-align: left; background: none; border: none; }
  .date-preset:hover { background: var(--bg-card-alt); color: var(--text-primary); }
  .date-preset.active { background: var(--bg-card-alt); color: var(--accent); }
  .date-custom { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .date-custom label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .date-custom input[type="date"] { padding: 7px 10px; border-radius: 6px; border: 1px solid var(--border-hover); background: var(--bg-input); color: var(--text-primary); font-size: 13px; width: 100%; }
  .date-custom .apply-btn { padding: 8px 16px; border-radius: 8px; border: none; background: var(--accent); color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 4px; }
  .date-custom .apply-btn:hover { background: var(--accent-hover); }

  /* Click outside to close */
  .overlay { position: fixed; inset: 0; z-index: 99; display: none; }
  .overlay.open { display: block; }

  .header-controls { display: flex; align-items: center; gap: 10px; }

  /* KPI STRIP */
  .kpi-strip { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; padding: 16px 24px; }
  .kpi-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .kpi-card .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .kpi-card .value { font-size: 20px; font-weight: 700; color: var(--text-primary); }
  .kpi-card .delta { font-size: 11px; font-weight: 600; margin-top: 2px; }
  .kpi-card .delta.up { color: var(--positive); }
  .kpi-card .delta.down { color: var(--negative); }

  /* CHART SECTIONS */
  .section { padding: 0 24px 16px; }
  .section-row { display: flex; gap: 16px; padding: 0 24px 16px; }
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .card-full { width: 100%; }
  .card-half { flex: 1; min-width: 0; }
  .card-header { padding: 14px 20px 10px; }
  .card-header h3 { font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin: 0; }
  .chart-wrap { position: relative; height: 340px; padding: 0 20px 16px; }
  .chart-wrap-sm { position: relative; height: 280px; padding: 0 20px 16px; }

  /* FUNNEL */
  .funnel-wrap { padding: 20px 20px 16px; }
  .funnel-step { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
  .funnel-label { font-size: 12px; color: var(--text-secondary); min-width: 120px; text-align: right; font-weight: 600; }
  .funnel-bar { height: 44px; border-radius: 6px; display: flex; align-items: center; padding: 0 14px; color: #fff; font-size: 13px; font-weight: 700; min-width: 60px; transition: width 0.4s ease; }
  .funnel-rate { font-size: 11px; color: var(--text-muted); margin-left: 8px; white-space: nowrap; }
  .funnel-dropoff { font-size: 11px; color: var(--negative); padding: 2px 0 8px 136px; font-weight: 500; }

  /* PERFORMANCE TABLE */
  .perf-table-section { padding: 0 24px 16px; }
  .perf-table-wrap { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .perf-table-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 10px; }
  .perf-table-header h3 { font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin: 0; }
  .perf-table-scroll { overflow-x: auto; }
  .perf-table { width: 100%; border-collapse: collapse; font-size: 12px; white-space: nowrap; }
  .perf-table thead { position: sticky; top: 0; z-index: 1; }
  .perf-table th { background: var(--table-header-bg); color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; font-size: 10px; padding: 8px 12px; text-align: center; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
  .perf-table th:hover { color: var(--text-secondary); }
  .perf-table th:first-child { text-align: center; position: sticky; left: 0; background: var(--table-header-bg); z-index: 2; }
  .perf-table th .sort-arrow { font-size: 9px; margin-left: 3px; opacity: 0.3; }
  .perf-table th.sorted .sort-arrow { opacity: 1; color: var(--sort-active); }
  .perf-table td { padding: 7px 12px; text-align: center; border-bottom: 1px solid var(--table-border); color: var(--text-secondary); }
  .perf-table td:first-child { text-align: center; font-weight: 600; color: var(--text-primary); position: sticky; left: 0; background: var(--bg-card); z-index: 1; }
  .perf-table tbody tr:hover td { background: var(--table-hover); }
  .perf-table tbody tr:hover td:first-child { background: var(--table-hover); }
  .perf-table .highlight-best { background: var(--highlight-bg); color: var(--highlight-text); font-weight: 700; }

  /* SCALING SIGNALS */
  .signals-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; padding: 0 24px 24px; }
  .signal-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; }
  .signal-card .signal-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .signal-card .signal-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .signal-card .signal-dot.green { background: var(--positive); }
  .signal-card .signal-dot.amber { background: var(--amber); }
  .signal-card .signal-dot.red { background: var(--negative); }
  .signal-card .signal-title { font-size: 13px; font-weight: 700; color: var(--text-primary); }
  .signal-card .signal-value { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .signal-card .signal-value.green { color: var(--positive); }
  .signal-card .signal-value.amber { color: var(--amber); }
  .signal-card .signal-value.red { color: var(--negative); }
  .signal-card .signal-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }

  /* FOOTER */
  .footer-note { text-align: center; padding: 12px 24px 24px; font-size: 11px; color: var(--text-muted); }

  .info-tip { display: inline-block; font-size: 10px; opacity: 0.5; cursor: help; margin-left: 2px; }
  .tooltip-popup { position: fixed; background: #111; color: #fff; font-size: 11px; padding: 5px 10px; border-radius: 6px; pointer-events: none; font-weight: 400; text-transform: none; letter-spacing: 0; z-index: 9999; box-shadow: 0 2px 8px rgba(0,0,0,0.4); display: none; border: 1px solid #333; max-width: 90vw; white-space: normal; }
  [data-theme="light"] .tooltip-popup { background: #1a1a1a; color: #fff; border-color: #333; }

  /* RESPONSIVE */
  @media (max-width: 1200px) {
    .kpi-strip { grid-template-columns: repeat(4, 1fr); }
  }
  @media (max-width: 768px) {
    .kpi-strip { grid-template-columns: repeat(2, 1fr); }
    .section-row { flex-direction: column; }
    .signals-grid { grid-template-columns: 1fr; }
    .date-dropdown { right: auto; left: 0; }
  }
</style>
</head>

// ── HELPERS ──
const fmt = (v, type) => {
  if (type === 'gbp') return '£' + v.toLocaleString('en-GB', {minimumFractionDigits:2, maximumFractionDigits:2});
  if (type === 'gbp0') return '£' + v.toLocaleString('en-GB', {minimumFractionDigits:0, maximumFractionDigits:0});
  if (type === 'num') return v.toLocaleString('en-GB', {maximumFractionDigits:0});
  if (type === 'dec') return v.toLocaleString('en-GB', {minimumFractionDigits:2, maximumFractionDigits:2});
  if (type === 'pct') return v.toFixed(2) + '%';
  if (type === 'x') return v.toFixed(2) + 'x';
  return v;
};

const monthLabel = (m) => {
  const d = new Date(m);
  return d.toLocaleDateString('en-GB', {month:'short', year:'2-digit'});
};

function getFilteredData(period) {
  if (period === 'all') return [...metaData];
  const now = new Date('2026-03-31');
  const days = parseInt(period);
  const cutoff = new Date(now);
  cutoff.setDate(cutoff.getDate() - days);
  return metaData.filter(d => new Date(d.month) >= cutoff);
}

function sumField(data, field) { return data.reduce((s, r) => s + r[field], 0); }

    currentPeriod = String(diffDays);

// ── KPIs ──
function buildKPIs(data) {
  const totalSpend = sumField(data, 'spend');
  const totalRev = sumField(data, 'purchaseValue');
  const totalPurchases = sumField(data, 'purchases');
  const totalImpressions = sumField(data, 'impressions');
  const totalClicks = sumField(data, 'clicks');
  const totalLinkClicks = sumField(data, 'linkClicks');
  const roas = totalSpend > 0 ? totalRev / totalSpend : 0;
  const cpa = totalPurchases > 0 ? totalSpend / totalPurchases : 0;
  const cpm = totalImpressions > 0 ? (totalSpend / totalImpressions) * 1000 : 0;
  const cpc = totalClicks > 0 ? totalSpend / totalClicks : 0;
  const ctr = totalImpressions > 0 ? (totalClicks / totalImpressions) * 100 : 0;

  const kpis = [
    { label: 'Spend', value: fmt(totalSpend, 'gbp'), tip: 'Total Meta advertising spend' },
    { label: 'Revenue', value: fmt(totalRev, 'gbp'), tip: 'Purchase value attributed to Meta ads' },
    { label: 'ROAS', value: fmt(roas, 'x'), tip: 'Revenue \u00f7 Ad Spend' },
    { label: 'CPA', value: fmt(cpa, 'gbp'), tip: 'Ad Spend \u00f7 Purchases' },
    { label: 'Purchases', value: fmt(totalPurchases, 'num'), tip: 'Total purchases attributed to Meta ads' },
    { label: 'CPM', value: fmt(cpm, 'gbp'), tip: 'Ad Spend \u00f7 Impressions \u00d7 1000' },
    { label: 'CPC', value: fmt(cpc, 'gbp'), tip: 'Ad Spend \u00f7 Link Clicks' },
    { label: 'CTR', value: fmt(ctr, 'pct'), tip: 'Link Clicks \u00f7 Impressions \u00d7 100' },
  ];

  const strip = document.getElementById('kpiStrip');
  strip.innerHTML = kpis.map(k => `
    <div class="kpi-card">
      <div class="label">${k.label} <span class="info-tip" data-tip="${k.tip}">ⓘ</span></div>
      <div class="value">${k.value}</div>
    </div>
  `).join('');
}

function buildFunnel(data) {
  const wrap = document.getElementById('funnelWrap');
  const totals = {
    impressions: sumField(data, 'impressions'),
    linkClicks: sumField(data, 'linkClicks'),
    lpv: sumField(data, 'lpv'),
    atc: sumField(data, 'atc'),
    ic: sumField(data, 'ic'),
    purchases: sumField(data, 'purchases'),
  };

  const steps = [
    { label: 'Impressions', value: totals.impressions, color: '#6366f1' },
    { label: 'Link Clicks', value: totals.linkClicks, color: '#8b5cf6' },
    { label: 'Landing Page Views', value: totals.lpv, color: '#a78bfa' },
    { label: 'Add to Cart', value: totals.atc, color: '#f59e0b' },
    { label: 'Initiate Checkout', value: totals.ic, color: '#f97316' },
    { label: 'Purchase', value: totals.purchases, color: '#10b981' },
  ];

  const maxVal = steps[0].value;
  let html = '';
  steps.forEach((step, i) => {
    const widthPct = Math.max(8, (step.value / maxVal) * 100);
    html += `<div class="funnel-step">
      <div class="funnel-label">${step.label}</div>
      <div class="funnel-bar" style="width:${widthPct}%; background:${step.color};">${fmt(step.value, 'num')}</div>
      ${i > 0 ? `<span class="funnel-rate">${((step.value / steps[i-1].value) * 100).toFixed(1)}% from prev</span>` : ''}
    </div>`;
    if (i > 0 && i < steps.length) {
      const drop = steps[i-1].value - step.value;
      const dropPct = ((drop / steps[i-1].value) * 100).toFixed(1);
      html += `<div class="funnel-dropoff">-${fmt(drop, 'num')} (${dropPct}% drop-off)</div>`;
    }
  });
  wrap.innerHTML = html;
}

  { key: 'purchaseRate', label: 'Purchase Rate', fmt: v => fmt(v, 'pct') },

let sortCol = 'month';
let sortDir = -1; // desc

function buildTable(data) {
  // Enrich data with computed rates
  const enriched = data.map(d => ({
    ...d,
    atcRate: d.linkClicks > 0 ? (d.atc / d.linkClicks * 100) : 0,
    icRate: d.atc > 0 ? (d.ic / d.atc * 100) : 0,
    purchaseRate: d.ic > 0 ? (d.purchases / d.ic * 100) : 0,
  }));

  // Find best ROAS month
  const bestRoas = Math.max(...enriched.map(d => d.roas));

  // Sort
  enriched.sort((a, b) => {
    const av = a[sortCol], bv = b[sortCol];
    if (typeof av === 'string') return sortDir * av.localeCompare(bv);
    return sortDir * (av - bv);
  });

  // Header
  const head = document.getElementById('perfHead');
  head.innerHTML = tableCols.map(c => {
    const isSorted = sortCol === c.key;
    const arrow = isSorted ? (sortDir === 1 ? '▲' : '▼') : '▲';
    return `<th class="${isSorted ? 'sorted' : ''}" data-col="${c.key}">${c.label}<span class="sort-arrow">${arrow}</span></th>`;
  }).join('');

  // Body
  const body = document.getElementById('perfBody');
  body.innerHTML = enriched.map(row => {
    return '<tr>' + tableCols.map(c => {
      let cls = '';
      if (c.key === 'roas' && row.roas === bestRoas) cls = 'highlight-best';
      return `<td class="${cls}">${c.fmt(row[c.key])}</td>`;
    }).join('') + '</tr>';
  }).join('');

  // Add sort listeners
  head.querySelectorAll('th').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (sortCol === col) { sortDir *= -1; }
      else { sortCol = col; sortDir = col === 'month' ? -1 : -1; }
      buildTable(data);
    });
  });
}

// ── SCALING SIGNALS ──
function buildSignals(data) {
  const grid = document.getElementById('signalsGrid');
  const signals = [];

  // 1. ROAS Trend - compare last 3 months to prior 3
  if (data.length >= 6) {
    const last3 = data.slice(-3);
    const prior3 = data.slice(-6, -3);
    const avgLast = last3.reduce((s,d) => s + d.roas, 0) / 3;
    const avgPrior = prior3.reduce((s,d) => s + d.roas, 0) / 3;
    const change = ((avgLast - avgPrior) / avgPrior * 100);
    const isUp = change > 0;
    signals.push({
      title: 'ROAS Trend',
      dot: isUp ? 'green' : 'red',
      value: (isUp ? '+' : '') + change.toFixed(1) + '%',
      valueClass: isUp ? 'green' : 'red',
      desc: `Last 3-month avg ROAS: ${avgLast.toFixed(2)}x vs prior 3-month avg: ${avgPrior.toFixed(2)}x. ${isUp ? 'Efficiency is improving.' : 'Efficiency is declining -- review creative and audiences.'}`,
    });
  }

  // 2. CPM Trend
  if (data.length >= 6) {
    const last3 = data.slice(-3);
    const prior3 = data.slice(-6, -3);
    const avgLast = last3.reduce((s,d) => s + d.cpm, 0) / 3;
    const avgPrior = prior3.reduce((s,d) => s + d.cpm, 0) / 3;
    const change = ((avgLast - avgPrior) / avgPrior * 100);
    const isRising = change > 5;
    const isStable = Math.abs(change) <= 5;
    signals.push({
      title: 'CPM Trend',
      dot: isRising ? 'red' : isStable ? 'green' : 'green',
      value: (change > 0 ? '+' : '') + change.toFixed(1) + '%',
      valueClass: isRising ? 'red' : 'green',
      desc: `Last 3-month avg CPM: £${avgLast.toFixed(2)} vs prior: £${avgPrior.toFixed(2)}. ${isRising ? 'Rising CPMs may indicate audience saturation or increased competition.' : 'CPMs are stable or declining -- good signal for scaling.'}`,
    });
  }

  // 3. Frequency Alert
  signals.push({
    title: 'Frequency Alert',
    dot: 'amber',
    value: 'N/A',
    valueClass: 'amber',
    desc: 'Frequency data is not yet available in the current dataset. Once available, monitor frequency to detect audience fatigue (ideal < 2.5 for prospecting).',
  });

  // 4. Best Month
  const best = data.reduce((b, d) => d.roas > b.roas ? d : b, data[0]);
  signals.push({
    title: 'Best Month',
    dot: 'green',
    value: monthLabel(best.month),
    valueClass: 'green',
    desc: `${monthLabel(best.month)} achieved the highest ROAS at ${best.roas.toFixed(2)}x with £${best.spend.toLocaleString('en-GB',{minimumFractionDigits:2})} spend generating £${best.purchaseValue.toLocaleString('en-GB',{minimumFractionDigits:2})} revenue (${best.purchases} purchases).`,
  });

  // 5. Funnel Bottleneck
  const totals = {
    impressions: sumField(data, 'impressions'),
    linkClicks: sumField(data, 'linkClicks'),
    lpv: sumField(data, 'lpv'),
    atc: sumField(data, 'atc'),
    ic: sumField(data, 'ic'),
    purchases: sumField(data, 'purchases'),
  };
  const funnelSteps = [
    { from: 'Impressions', to: 'Link Clicks', rate: totals.linkClicks / totals.impressions },
    { from: 'Link Clicks', to: 'LPVs', rate: totals.lpv / totals.linkClicks },
    { from: 'LPVs', to: 'Add to Cart', rate: totals.atc / totals.lpv },
    { from: 'Add to Cart', to: 'Initiate Checkout', rate: totals.ic / totals.atc },
    { from: 'Initiate Checkout', to: 'Purchase', rate: totals.purchases / totals.ic },
  ];
  const bottleneck = funnelSteps.reduce((worst, s) => s.rate < worst.rate ? s : worst, funnelSteps[0]);
  signals.push({
    title: 'Funnel Bottleneck',
    dot: 'red',
    value: bottleneck.from + ' \u2192 ' + bottleneck.to,
    valueClass: 'red',
    desc: `The biggest drop-off is ${bottleneck.from} to ${bottleneck.to} at ${(bottleneck.rate * 100).toFixed(2)}% conversion. Focus optimisation efforts here for the highest ROI impact.`,
  });

  grid.innerHTML = signals.map(s => `
    <div class="signal-card">
      <div class="signal-header">
        <div class="signal-dot ${s.dot}"></div>
        <div class="signal-title">${s.title}</div>
      </div>
      <div class="signal-value ${s.valueClass}">${s.value}</div>
      <div class="signal-desc">${s.desc}</div>
    </div>
  `).join('');
}

// ── REBUILD ALL ──
function rebuildAll() {
  const data = getFilteredData(currentPeriod);
  buildKPIs(data);
  buildSpendRevenueChart(data);
  buildFunnel(data);
  buildEfficiencyChart(data);
  buildFunnelRatesChart(data);
  buildTable(data);
  buildSignals(data);
}

rebuildAll();

// --- Tooltip popup for info-tip elements ---
const tooltipEl = document.getElementById('tooltipPopup');
document.addEventListener('mouseover', e => {
  const tip = e.target.closest('.info-tip');
  if (tip && tip.dataset.tip) {
    const rect = tip.getBoundingClientRect();
    tooltipEl.textContent = tip.dataset.tip;
    tooltipEl.style.display = 'block';
    let left = rect.left + rect.width / 2 - tooltipEl.offsetWidth / 2;
    let top = rect.top - tooltipEl.offsetHeight - 6;
    left = Math.max(8, Math.min(left, window.innerWidth - tooltipEl.offsetWidth - 8));
    if (top < 4) top = rect.bottom + 6;
    top = Math.max(4, Math.min(top, window.innerHeight - tooltipEl.offsetHeight - 4));
    tooltipEl.style.left = left + 'px';
    tooltipEl.style.top = top + 'px';
  }
});
document.addEventListener('mouseout', e => {
  if (e.target.closest('.info-tip')) tooltipEl.style.display = 'none';
});
</script>
